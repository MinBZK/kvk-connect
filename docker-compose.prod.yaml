name: kvk-connect-db-external
services:
  gateway:
    image: ghcr.io/minbzk/gateway:${KVK_VERSION:-latest}
    container_name: kvk-gateway
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - KVK_API_HOST=${KVK_API_HOST}
      - KVK_API_KEY_PROD=${KVK_API_KEY_PROD}
      - LOG_LEVEL=${LOG_LEVEL}
      - RATE_LIMIT_CALLS=${RATE_LIMIT_CALLS}
    networks:
      - kvk-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  mutatie-reader:
    image: ghcr.io/minbzk/mutatie-reader:${KVK_VERSION:-latest}
    container_name: kvk-mutatie-reader
    restart: unless-stopped
    environment:
      - KVK_BASE_URL=http://gateway/api/v1
      - KVK_API_HOST=${KVK_API_HOST}
      - KVK_API_KEY_PROD=${KVK_API_KEY_PROD}
      - KVK_MUTATIE_ABONNEMENT_ID=${KVK_MUTATIE_ABONNEMENT_ID}
      - KVK_RETRY_DELAY_HOURS=${KVK_RETRY_DELAY_HOURS}
      - LOG_LEVEL=${LOG_LEVEL}
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI}
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - kvk-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  basisprofiel:
    image: ghcr.io/minbzk/basisprofiel:${KVK_VERSION:-latest}
    container_name: kvk-basisprofiel
    restart: unless-stopped
    environment:
      - KVK_BASE_URL=http://gateway/api/v1
      - KVK_API_HOST=${KVK_API_HOST}
      - KVK_API_KEY_PROD=${KVK_API_KEY_PROD}
      - KVK_RETRY_DELAY_HOURS=${KVK_RETRY_DELAY_HOURS}
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI}
      - LOG_LEVEL=${LOG_LEVEL}
    depends_on:
      gateway:
        condition: service_healthy
      mutatie-reader:
        condition: service_started
    networks:
      - kvk-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  vestigingen:
    image: ghcr.io/minbzk/vestigingen:${KVK_VERSION:-latest}
    container_name: kvk-vestigingen
    restart: unless-stopped
    environment:
      - KVK_BASE_URL=http://gateway/api/v1
      - KVK_API_HOST=${KVK_API_HOST}
      - KVK_API_KEY_PROD=${KVK_API_KEY_PROD}
      - KVK_RETRY_DELAY_HOURS=${KVK_RETRY_DELAY_HOURS}
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI}
      - LOG_LEVEL=${LOG_LEVEL}
    depends_on:
      gateway:
        condition: service_healthy
      basisprofiel:
        condition: service_started
    networks:
      - kvk-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  vestigingsprofiel:
    image: ghcr.io/minbzk/vestigingsprofiel:${KVK_VERSION:-latest}
    container_name: kvk-vestigingsprofiel
    restart: unless-stopped
    environment:
      - KVK_BASE_URL=http://gateway/api/v1
      - KVK_API_HOST=${KVK_API_HOST}
      - KVK_API_KEY_PROD=${KVK_API_KEY_PROD}
      - KVK_RETRY_DELAY_HOURS=${KVK_RETRY_DELAY_HOURS}
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI}
      - LOG_LEVEL=${LOG_LEVEL}
    depends_on:
      gateway:
        condition: service_healthy
      vestigingen:
        condition: service_started
    networks:
      - kvk-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  mcp-server:
    image: ghcr.io/minbzk/mcp-server:${KVK_VERSION:-latest}
    container_name: kvk-mcp-server
    restart: unless-stopped
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8050
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI}
    ports:
      - "8050:8050"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - kvk-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8050/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  kvk-network:
    driver: bridge
